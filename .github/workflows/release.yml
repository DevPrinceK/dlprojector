name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to publish, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark this release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  verify:
    name: Verify web app
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build Tauri frontend
        run: npm run build

      - name: Build marketing website
        run: npm run website:build

  build:
    name: Build ${{ matrix.platform.name }}
    needs: verify
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            runner: windows-2022
            tauri_args: "--bundles msi,nsis"
            artifact_globs: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS
            runner: macos-14
            tauri_args: "--bundles dmg"
            artifact_globs: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - name: Linux
            runner: ubuntu-24.04
            tauri_args: "--bundles deb,appimage"
            artifact_globs: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag_name }}" >> "$GITHUB_ENV"
            echo "IS_PRERELEASE=${{ inputs.prerelease }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri bundles
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri -- build ${{ matrix.platform.tauri_args }}

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          find src-tauri/target/release/bundle -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > "checksums-${{ matrix.platform.name }}.txt"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dl-projector-${{ matrix.platform.name }}
          if-no-files-found: error
          path: |
            ${{ matrix.platform.artifact_globs }}
            checksums-${{ matrix.platform.name }}.txt

      - name: Upload installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: DL Projector ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: ${{ env.IS_PRERELEASE }}
          fail_on_unmatched_files: true
          files: |
            ${{ matrix.platform.artifact_globs }}
            checksums-${{ matrix.platform.name }}.txt
