name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to publish, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark this release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  verify:
    name: Verify web app
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build Tauri frontend
        run: npm run build

      - name: Build marketing website
        run: npm run website:build

  build:
    name: Build ${{ matrix.platform.name }}
    needs: verify
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            runner: windows-2022
            tauri_args: "--bundles msi,nsis"
            artifact_globs: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS
            runner: macos-14
            tauri_args: "--bundles dmg"
            artifact_globs: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - name: Linux
            runner: ubuntu-24.04
            tauri_args: "--bundles deb,appimage"
            artifact_globs: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag_name }}" >> "$GITHUB_ENV"
            echo "IS_PRERELEASE=${{ inputs.prerelease }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libssl-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Synchronize application version
        shell: bash
        run: npm run version:sync -- "${RELEASE_TAG#v}"

      - name: Validate Apple signing certificate
        if: runner.os == 'macOS' && vars.ENABLE_APPLE_SIGNING == 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for variable in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID
          do
            if [ -z "${!variable}" ]; then
              echo "::error::ENABLE_APPLE_SIGNING is true, but $variable is missing."
              exit 1
            fi
          done

          CERTIFICATE_PATH="$RUNNER_TEMP/apple-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/apple-signing-validation.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

          if [ ! -s "$CERTIFICATE_PATH" ]; then
            echo "::error::APPLE_CERTIFICATE did not decode to a certificate file. Store the base64 text of the exported .p12 file."
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          if ! security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign >/dev/null 2>&1
          then
            security delete-keychain "$KEYCHAIN_PATH" || true
            rm -f "$CERTIFICATE_PATH"
            echo "::error::APPLE_CERTIFICATE is not a valid .p12 file, or APPLE_CERTIFICATE_PASSWORD does not match its export password."
            exit 1
          fi

          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -Fq "$APPLE_SIGNING_IDENTITY"; then
            security delete-keychain "$KEYCHAIN_PATH" || true
            rm -f "$CERTIFICATE_PATH"
            echo "::error::APPLE_SIGNING_IDENTITY does not match a code-signing identity inside APPLE_CERTIFICATE."
            exit 1
          fi

          security delete-keychain "$KEYCHAIN_PATH"
          rm -f "$CERTIFICATE_PATH"
          echo "Apple signing certificate is valid."

      - name: Build signed and notarized macOS bundle
        if: runner.os == 'macOS' && vars.ENABLE_APPLE_SIGNING == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri -- build ${{ matrix.platform.tauri_args }}

      - name: Build ad-hoc signed macOS bundle
        if: runner.os == 'macOS' && vars.ENABLE_APPLE_SIGNING != 'true'
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: npm run tauri -- build ${{ matrix.platform.tauri_args }}

      - name: Import Windows signing certificate
        if: runner.os == 'Windows' && vars.ENABLE_WINDOWS_SIGNING == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE -or -not $env:WINDOWS_CERTIFICATE_PASSWORD -or -not $env:WINDOWS_CERTIFICATE_THUMBPRINT) {
            throw "Windows signing is enabled, but certificate secrets are incomplete."
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP "windows-signing.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $password | Out-Null
          if (-not (Test-Path "Cert:\CurrentUser\My\$env:WINDOWS_CERTIFICATE_THUMBPRINT")) {
            throw "Imported certificate thumbprint does not match WINDOWS_CERTIFICATE_THUMBPRINT."
          }

      - name: Build signed Windows bundles
        if: runner.os == 'Windows' && vars.ENABLE_WINDOWS_SIGNING == 'true'
        env:
          TAURI_CONFIG: >-
            {"bundle":{"windows":{"certificateThumbprint":"${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}","digestAlgorithm":"sha256","timestampUrl":"http://timestamp.digicert.com"}}}
        run: npm run tauri -- build ${{ matrix.platform.tauri_args }}

      - name: Build unsigned Windows bundles
        if: runner.os == 'Windows' && vars.ENABLE_WINDOWS_SIGNING != 'true'
        run: npm run tauri -- build ${{ matrix.platform.tauri_args }}

      - name: Build Linux bundles
        if: runner.os == 'Linux'
        run: npm run tauri -- build ${{ matrix.platform.tauri_args }}

      - name: Generate SHA-256 checksums
        shell: bash
        env:
          CHECKSUM_FILE: checksums-${{ matrix.platform.name }}.txt
        run: |
          node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const path = require("node:path");

          const bundleDirectory = path.resolve("src-tauri/target/release/bundle");
          const checksumFile = process.env.CHECKSUM_FILE;
          const installerExtensions = new Set([".msi", ".exe", ".dmg", ".deb", ".appimage"]);

          function collectInstallers(directory) {
            return fs.readdirSync(directory, { withFileTypes: true }).flatMap((entry) => {
              const entryPath = path.join(directory, entry.name);
              if (entry.isDirectory()) return collectInstallers(entryPath);
              return installerExtensions.has(path.extname(entry.name).toLowerCase()) ? [entryPath] : [];
            });
          }

          if (!fs.existsSync(bundleDirectory)) {
            throw new Error(`Bundle directory not found: ${bundleDirectory}`);
          }

          const installers = collectInstallers(bundleDirectory).sort();
          if (installers.length === 0) {
            throw new Error(`No installers found in ${bundleDirectory}`);
          }

          const checksums = installers.map((installerPath) => {
            const hash = crypto.createHash("sha256").update(fs.readFileSync(installerPath)).digest("hex");
            return `${hash}  ${path.basename(installerPath)}`;
          });

          fs.writeFileSync(checksumFile, `${checksums.join("\n")}\n`);
          console.log(`Generated ${checksumFile} for ${installers.length} installer(s).`);
          NODE

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dl-projector-${{ matrix.platform.name }}
          if-no-files-found: error
          path: |
            ${{ matrix.platform.artifact_globs }}
            checksums-${{ matrix.platform.name }}.txt

      - name: Upload installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: DL Projector ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: ${{ env.IS_PRERELEASE }}
          fail_on_unmatched_files: true
          files: |
            ${{ matrix.platform.artifact_globs }}
            checksums-${{ matrix.platform.name }}.txt
